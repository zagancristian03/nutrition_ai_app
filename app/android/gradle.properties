org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Avoid Kotlin incremental cache corruption on Windows (daemon / AV / stale plugin builds).
# Slightly slower Kotlin compiles; remove this line if builds are stable and you want speed.
kotlin.incremental=false
